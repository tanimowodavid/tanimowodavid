name: Generate Profile Visuals

on:
  # Run automatically every 24 hours
  schedule:
    - cron: "0 0 * * *"

  # Allows you to manually run the job at any time
  workflow_dispatch:

  # Run on every push to the main branch
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Step 1: Check out the repository so the runner can interact with it
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Generate the snake game SVG animations
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Step 3: Generate the Top Languages card locally
      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&theme=tokyonight"
          path: dist/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 4: Push all generated assets inside /dist to the 'output' branch
      - name: push generated assets to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
